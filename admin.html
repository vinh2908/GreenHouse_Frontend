<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản Trị - Green House</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="admin-content">
        <div class="admin-header">
            <a href="index.html" class="btn-home">⬅ Về Website</a>
            <button class="btn-reset" onclick="resetData()">Reset Dữ Liệu</button>
        </div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('orders')">📦 Đơn Hàng</button>
            <button class="tab-btn" onclick="switchTab('products')">🛒 Kho Hàng</button>
            <button class="tab-btn" onclick="switchTab('maids')">👩‍💼 Giúp Việc</button>
        </div>
        <div id="tab-orders" class="panel active">
            <div style="display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap;">
         <div style="flex: 2; min-width: 300px; background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
             <h3 style="margin: 0 0 15px 0; color: #1f2937; font-size: 18px;">📈 Doanh Thu Hệ Thống</h3>
             <canvas id="revenueChart" height="80"></canvas>
         </div>
         <div style="flex: 1; min-width: 300px; background: #fff; padding: 20px; border-radius: 16px; border: 1px solid #eee; box-shadow: 0 4px 15px rgba(0,0,0,0.03);">
             <h3 style="margin: 0 0 15px 0; color: #1f2937; font-size: 18px;">📊 Tỷ Lệ Đơn Hàng</h3>
             <canvas id="statusChart" height="200"></canvas>
         </div>
     </div>
            <table id="orderTable">
                <thead>
                    <tr><th>Mã</th><th>Khách Hàng</th><th>Chi Tiết Dịch Vụ</th><th>Tổng</th><th>Trạng Thái</th><th>Hành Động</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="tab-products" class="panel">
            <div class="form-grid">
                <input type="hidden" name="Id" id="pId">
                <div><label>Tên SP</label><input type="text" name="Name" id="pName" required></div>
                <div><label>Giá</label><input type="number" name="Price" id="pPrice" required></div>
                <div style="grid-column: span 2;">
                    <label>Ảnh Chính</label>
                    <div class="upload-row">
                        <input type="text" name="ImageUrl" id="pImg" placeholder="Link hoặc Paste" onpaste="xuLyDanAnh(event)">
                        <input type="file" id="inpFile" style="display:none" onchange="xuLyChonFile(this, 'pImg')">
                        <label for="inpFile">📂</label>
                    </div>
                </div>
                <div style="grid-column: span 2;"><label>Album Ảnh</label><input type="text" id="pAlbum" placeholder="Link1, Link2..."></div>
                <div style="grid-column: span 2;"><label>Mô Tả</label><textarea name="Description" id="pDesc" rows="3"></textarea></div>
                <div style="grid-column: span 2; display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" class="btn-cancel" id="btnCancelP" onclick="cancelEditP()">Hủy</button>
                    <button type="button" class="btn-submit" id="btnSaveP" onclick="saveProduct()">+ Thêm SP</button>
                </div>
            </div>
            <table id="productTable">
                <thead><tr><th>Ảnh</th><th>Tên</th><th>Giá</th><th>Thao Tác</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
        <div id="tab-maids" class="panel">
            <div class="form-grid">
                <input type="hidden" id="mId">
                <div><label>Tên</label><input type="text" id="mName"></div>
                <div><label>Tuổi</label><input type="number" id="mAge"></div>
                <div><label>Quê</label><input type="text" id="mHome"></div>
                <div><label>Kinh Nghiệm</label><input type="text" id="mExp"></div>
                <div style="grid-column: span 2;">
                    <label>Sở Trường</label>
                    <select id="mSkill" class="full-width">
                        <option value="">-- Chọn sở trường --</option>
                        <option value="Nấu ăn">Đầu bếp gia đình</option>
                        <option value="Trông trẻ">Bảo mẫu / Chăm bé</option>
                        <option value="Dọn dẹp">Tổng vệ sinh</option>
                        <option value="Làm vườn">Chăm sóc cảnh quan</option>
                        <option value="Chăm người già">Chăm sóc người cao tuổi</option>
                        <option value="Thú cưng">Chăm sóc thú cưng</option>
                        <option value="Điện nước">Bảo trì & Vệ sinh máy lạnh</option>
                        <option value="Decor">Trang trí & Setup tiệc</option>
                        <option value="Làm vườn">Dọn dẹp vườn & chăm sóc cây cối</option>
                    </select>
                </div>
                <div style="grid-column: span 2;">
                    <label>Ảnh</label>
                    <div class="upload-row">
                        <input type="text" id="mImg" placeholder="Link/Paste" onpaste="xuLyDanAnh(event)">
                        <input type="file" id="inpFileMaid" style="display:none" onchange="xuLyChonFile(this, 'mImg')">
                        <label for="inpFileMaid">📂</label>
                    </div>
                </div>
                <div style="grid-column: span 2;"><label>Giới Thiệu</label><textarea id="mDesc" rows="2"></textarea></div>
                <div style="grid-column: span 2; display: flex; gap: 10px; justify-content: flex-end;">
                    <button class="btn-cancel" id="btnCancelM" onclick="cancelEditM()">Hủy</button>
                    <button class="btn-submit" id="btnSaveM" onclick="saveMaid()">+ Thêm GV</button>
                </div>
            </div>
            <table id="maidTable">
                <thead><tr><th>Ảnh</th><th>Tên/Tuổi</th><th>Kinh Nghiệm</th><th>Thao Tác</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div class="admin-chat-widget" id="chatWidget" onclick="toggleChatUI(event)">
        <div id="chatNotify" class="badge" style="display:none;">1</div>
        <i class="fas fa-comments"></i>
        <div class="chat-layout" onclick="event.stopPropagation()">
            <div class="chat-sidebar" id="userList"></div>
            <div class="chat-main">
                <div class="chat-header">
                    <span id="chatWithUser">Chăm sóc khách hàng</span>
                    <span class="chat-close-btn" onclick="closeChatUI(event)" style="cursor:pointer; font-size:20px;">×</span>
                </div>
                <div id="chatMsgs" style="flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px;"></div>
                <div style="padding:15px; border-top:1px solid #e2d6d6; display:flex; gap:10px; background:rgb(255, 255, 255);">
                    <input type="text" id="adminInput" placeholder="Nhập tin..." style="flex:1; padding:10px; border:1px solid #ddd; border-radius:5px;" onkeypress="if(event.key==='Enter') sendAdminMsg()">
                    <button onclick="sendAdminMsg()" style="background:#0984e3; color:rgb(246, 249, 253); border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">Gửi</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/main.js"></script>
    <script src="js/init.js"></script>
</body>
</html>
